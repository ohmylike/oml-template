name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number for manual trigger"
        required: true
        type: string
      action:
        description: "deploy or cleanup"
        default: "deploy"
        type: choice
        options:
          - deploy
          - cleanup

concurrency:
  group: preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    if: github.repository != 'ohmylike/oml-template'
    uses: ohmylike/oml-workflows/.github/workflows/preview-deploy.yml@main
    with:
      service_name: __SERVICE_NAME__
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
      action: ${{ inputs.action || 'deploy' }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
      TURSO_PREVIEW_AUTH_TOKEN: ${{ secrets.TURSO_PREVIEW_AUTH_TOKEN }}
