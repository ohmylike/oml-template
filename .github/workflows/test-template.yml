name: Test Template

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap-smoke:
    if: github.repository == 'ohmylike/oml-template'
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: template-smoke
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "pnpm"

      - name: Bootstrap generated repository
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          url_file=''
          server_pid=''

          cleanup() {
            if [ -n "$server_pid" ]; then
              kill "$server_pid" 2>/dev/null || true
              wait "$server_pid" 2>/dev/null || true
            fi

            if [ -n "$url_file" ]; then
              rm -f "$url_file"
            fi

            rm -rf "$tmpdir"
          }

          trap cleanup EXIT

          git archive --format=tar HEAD | tar -xf - -C "$tmpdir"
          cd "$tmpdir"

          OML_BOOTSTRAP_SKIP_INFRA=1 ./bootstrap.sh "$SERVICE_NAME"

          if grep -R -n "__SERVICE_NAME__" .; then
            echo "Unreplaced template placeholders remain"
            exit 1
          fi

          if [ -e bootstrap.sh ]; then
            echo "bootstrap.sh should remove itself after initialization"
            exit 1
          fi

          pnpm install --frozen-lockfile
          pnpm build
          pnpm test
          url_file="$(mktemp)"
          CLI_E2E_SERVICE_NAME="$SERVICE_NAME" pnpm exec tsx test/start-local-api-server.ts > "$url_file" &
          server_pid=$!

          for _ in $(seq 1 30); do
            if [ -s "$url_file" ]; then
              break
            fi
            sleep 1
          done

          if [ ! -s "$url_file" ]; then
            echo "Local API server did not report a base URL"
            exit 1
          fi

          CLI_E2E_API_URL="$(cat "$url_file")" CLI_E2E_SERVICE_NAME="$SERVICE_NAME" pnpm test:cli:e2e
