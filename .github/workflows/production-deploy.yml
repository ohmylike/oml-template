name: Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run production DB migrations before deploy"
        required: true
        default: true
        type: boolean

concurrency:
  group: production-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    if: github.repository != 'ohmylike/oml-template'
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          OML_ENABLE_PRODUCTION_DEPLOY: ${{ vars.OML_ENABLE_PRODUCTION_DEPLOY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
          TURSO_PRODUCTION_AUTH_TOKEN: ${{ secrets.TURSO_PRODUCTION_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${OML_ENABLE_PRODUCTION_DEPLOY:-}" != "1" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Production deploy skipped"
              echo ""
              echo "Repo variable \`OML_ENABLE_PRODUCTION_DEPLOY\` is not set to \`1\` yet."
              echo "Run \`./scripts/sync-github-secrets.sh --enable-production-deploy ...\` before expecting production deploy to run."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          missing_secrets=()
          missing_vars=()
          [[ -n "${CLOUDFLARE_API_TOKEN}" ]] || missing_secrets+=("CLOUDFLARE_API_TOKEN")
          [[ -n "${CLOUDFLARE_ACCOUNT_ID}" ]] || missing_vars+=("CLOUDFLARE_ACCOUNT_ID")
          [[ -n "${TURSO_API_TOKEN}" ]] || missing_secrets+=("TURSO_API_TOKEN")
          [[ -n "${TURSO_PRODUCTION_AUTH_TOKEN}" ]] || missing_secrets+=("TURSO_PRODUCTION_AUTH_TOKEN")

          if [ "${#missing_secrets[@]}" -eq 0 ] && [ "${#missing_vars[@]}" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=false" >> "$GITHUB_OUTPUT"
          {
            echo "### Production deploy skipped"
            echo ""
            echo "Missing GitHub configuration."
            if [ "${#missing_secrets[@]}" -gt 0 ]; then
              echo "Missing secrets: \`${missing_secrets[*]}\`."
            fi
            if [ "${#missing_vars[@]}" -gt 0 ]; then
              echo "Missing variables: \`${missing_vars[*]}\`."
            fi
            echo "Run \`./scripts/sync-github-secrets.sh --enable-production-deploy ...\` to sync the required secrets and variables."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    if: github.repository != 'ohmylike/oml-template' && needs.preflight.outputs.ready == 'true'
    needs: preflight
    uses: ohmylike/oml-workflows/.github/workflows/production-deploy.yml@main
    with:
      service_name: __SERVICE_NAME__
      cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      run_migrations: ${{ github.event_name != 'workflow_dispatch' || inputs.run_migrations }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
      TURSO_PRODUCTION_AUTH_TOKEN: ${{ secrets.TURSO_PRODUCTION_AUTH_TOKEN }}
