name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number for manual trigger"
        required: true
        type: string
      action:
        description: "deploy or cleanup"
        default: "deploy"
        type: choice
        options:
          - deploy
          - cleanup

concurrency:
  group: preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preflight:
    if: github.repository != 'ohmylike/oml-template'
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
          TURSO_PREVIEW_AUTH_TOKEN: ${{ secrets.TURSO_PREVIEW_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          missing=()

          [[ -n "${CLOUDFLARE_API_TOKEN}" ]] || missing+=("CLOUDFLARE_API_TOKEN")
          [[ -n "${CLOUDFLARE_ACCOUNT_ID}" ]] || missing+=("CLOUDFLARE_ACCOUNT_ID")
          [[ -n "${TURSO_API_TOKEN}" ]] || missing+=("TURSO_API_TOKEN")
          [[ -n "${TURSO_PREVIEW_AUTH_TOKEN}" ]] || missing+=("TURSO_PREVIEW_AUTH_TOKEN")

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "ready=false" >> "$GITHUB_OUTPUT"
          {
            echo "### Preview deploy skipped"
            echo ""
            echo "Missing GitHub secrets: \`${missing[*]}\`."
            echo "Run \`./scripts/sync-github-secrets.sh --enable-production-deploy ...\` before expecting preview deploy to run."
          } >> "$GITHUB_STEP_SUMMARY"

  preview:
    if: github.repository != 'ohmylike/oml-template' && needs.preflight.outputs.ready == 'true'
    needs: preflight
    uses: ohmylike/oml-workflows/.github/workflows/preview-deploy.yml@main
    with:
      service_name: __SERVICE_NAME__
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
      action: ${{ inputs.action || 'deploy' }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
      TURSO_PREVIEW_AUTH_TOKEN: ${{ secrets.TURSO_PREVIEW_AUTH_TOKEN }}

  cli-e2e-preview:
    if: github.repository != 'ohmylike/oml-template' && needs.preflight.outputs.ready == 'true' && github.event.action != 'closed' && (github.event_name != 'workflow_dispatch' || inputs.action != 'cleanup')
    needs: [preflight, preview]
    runs-on: ubuntu-latest
    env:
      CLI_E2E_API_URL: https://pr-${{ github.event.pull_request.number || inputs.pr_number }}-api.__SERVICE_NAME__.ohmylike.app
      CLI_E2E_SERVICE_NAME: __SERVICE_NAME__
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Wait for preview API health
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error "$CLI_E2E_API_URL/api/health" > /tmp/cli-e2e-health.json; then
              cat /tmp/cli-e2e-health.json
              exit 0
            fi

            echo "Waiting for preview API ($attempt/30): $CLI_E2E_API_URL"
            sleep 10
          done

          echo "::error::Preview API did not become healthy at $CLI_E2E_API_URL/api/health"
          exit 1

      - name: Run CLI E2E against preview API
        run: pnpm test:cli:e2e
