name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    if: github.repository != 'ohmylike/oml-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
